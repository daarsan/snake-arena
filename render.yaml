services:
  - type: web
    name: snake-arena
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snake-arena-db
          property: connectionString

databases:
  - name: snake-arena-db
    plan: free
    databaseName: snake_arena
    user: snake
