services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: snake
      POSTGRES_PASSWORD: snake
      POSTGRES_DB: snake_arena
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snake -d snake_arena"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://snake:snake@db:5432/snake_arena
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
