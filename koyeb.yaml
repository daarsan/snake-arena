name: snake-arena
services:
  - name: web
    type: web
    git:
      repository: github.com/daarsan/snake-arena
      branch: main
    docker:
      dockerfile: Dockerfile
    instance_types:
      - type: nano
    regions:
      - par
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    env:
      - key: DATABASE_URL
        secret: DATABASE_URL
    health_checks:
      - protocol: http
        port: 8000
        path: /api/docs
        interval: 30
        timeout: 5
        grace_period: 10
        restart_limit: 3
    scaling:
      min: 1
      max: 1
